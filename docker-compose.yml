services:
  postgres:
    image: postgres:16-alpine
    container_name: kaizen-clicker-postgres
    environment:
      POSTGRES_USER: kaizen
      POSTGRES_PASSWORD: kaizen
      POSTGRES_DB: kaizen_clicker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaizen -d kaizen_clicker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
